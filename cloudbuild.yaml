steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/gen-lang-client-0501556349/ai-factory/ai-business-factory:latest', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/gen-lang-client-0501556349/ai-factory/ai-business-factory:latest']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - 'ai-business-factory'
    - '--image=us-central1-docker.pkg.dev/gen-lang-client-0501556349/ai-factory/ai-business-factory:latest'
    - '--region=us-central1'
    - '--platform=managed'
    - '--allow-unauthenticated'

images:
- 'us-central1-docker.pkg.dev/gen-lang-client-0501556349/ai-factory/ai-business-factory:latest'
options:
  logging: CLOUD_LOGGING_ONLY
